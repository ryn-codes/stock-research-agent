version: '3.8'

services:
  # PostgreSQL with pgvector extension for ResearchGPT
  postgres:
    image: pgvector/pgvector:pg16
    container_name: researchgpt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: researchgpt
      POSTGRES_PASSWORD: researchgpt
      POSTGRES_DB: researchgpt
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U researchgpt']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
